<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Project Features Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global_bgm.css') }}">
  {% for feature in features %}
  <link rel="stylesheet" href="{{ url_for('static', filename=feature.css_file) }}">
  {% endfor %}
  <style>
    .game-entry {
      margin: 24px clamp(20px, 4vw, 56px);
      padding: 28px;
      border: 1px solid rgba(20, 33, 61, 0.08);
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(254, 240, 138, 0.35));
      box-shadow: 0 24px 60px rgba(20, 33, 61, 0.08);
    }

    .game-entry__eyebrow {
      margin: 0 0 10px;
      color: rgba(20, 33, 61, 0.62);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .game-entry__title {
      margin: 0;
      font-family: "Black Han Sans", sans-serif;
      font-weight: 400;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: #14213d;
    }

    .game-entry__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .game-entry__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 28px rgba(239, 68, 68, 0.24);
    }

    .game-entry__button--secondary {
      background: rgba(20, 33, 61, 0.08);
      color: #14213d;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <section class="game-entry">
    <p class="game-entry__eyebrow">Shortcuts</p>
    <h1 class="game-entry__title">배틀과 팀 관리</h1>
    <div class="game-entry__actions">
      <a class="game-entry__button" href="{{ url_for('main.game') }}">배틀 페이지</a>
      <a class="game-entry__button game-entry__button--secondary" href="{{ url_for('pokedex.my_teams_page') }}">내 팀 관리</a>
    </div>
  </section>

  {% for feature in features %}
    {% include feature.template_fragment %}
  {% endfor %}

  {% for feature in features %}
  <script src="{{ url_for('static', filename=feature.js_file) }}"></script>
  {% endfor %}
  <script src="{{ url_for('static', filename='js/global_bgm.js') }}"></script>
</body>
</html>
